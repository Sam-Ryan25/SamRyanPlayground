name: AI Generated Issue
description: Create a structured issue that will be refined by AI
title: "[Issue]: "
labels: ["ai-generated"]

body:
  - type: input
    id: summary
    attributes:
      label: Short summary
      description: Brief description of the problem
      placeholder: Login button not working
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem description
      description: Describe the issue in detail
      placeholder: What is happening and why it is a problem

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to login page
        2. Click login
        3. Nothing happens

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: What should happen instead?

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
        - Critical

  - type: textarea
    id: additional
    attributes:
      label: Additional information